<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .map-wrap {
    width: 100%;
    max-width: 640px;
    background: #ffffff;
    overflow: hidden;
  }

  #mapSvg { display: block; width: 100%; height: auto; }

  .country {
    fill: #ddeaf7;
    stroke: #b8d0e8;
    stroke-width: 0.4;
    stroke-linejoin: round;
    transition: fill 0.18s ease;
    cursor: pointer;
  }

  .country:hover { fill: #5a9fd4 !important; }

  .graticule {
    fill: none;
    stroke: #e4eef8;
    stroke-width: 0.3;
  }

  .marker { cursor: pointer; }
  .marker .ring {
    fill: rgba(210, 50, 30, 0.15);
    transition: all 0.2s;
  }
  .marker .dot {
    fill: #e84030;
    stroke: white;
    stroke-width: 1.8;
    filter: drop-shadow(0 1px 4px rgba(210,50,30,0.5));
    transition: all 0.2s;
  }
  .marker:hover .dot, .marker.active .dot {
    fill: #a31808;
    filter: drop-shadow(0 2px 8px rgba(210,50,30,0.75));
  }
  .marker.active .ring, .marker:hover .ring {
    r: 10;
    fill: rgba(210,50,30,0.22);
  }

  #loadMsg {
    padding: 4rem 1rem;
    text-align: center;
    color: #b0c0d0;
    font-family: sans-serif;
    font-size: 0.82rem;
  }
</style>
</head>
<body>
<div class="map-wrap">
  <div id="loadMsg">Loading map…</div>
  <svg id="mapSvg" style="display:none;"></svg>
</div>

<script>
const BALI = { lat: -8.3405, lon: 115.0920 };
let active = false;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    document.getElementById('loadMsg').remove();

    const svg = document.getElementById('mapSvg');
    svg.style.display = 'block';

    const W = 640, H = 380;

    // Flat = Mercator projection
    const projection = d3.geoMercator()
      .scale(W / 6.6)
      .translate([W / 2, H / 1.6]);

    const path = d3.geoPath().projection(projection);
    const countries = topojson.feature(world, world.objects.countries);

    // Crop: cut left side significantly, right a little, top a little, bottom (no Antarctica)
    const cropLeft   = W * 0.14;   // cut left ~14% — removes most of left ocean + left Americas edge
    const cropRight  = W * 0.985;  // tiny trim on right
    const cropTop    = H * 0.02;
    const cropBottom = H * 0.84;   // cut bottom (Antarctica)

    const clipW = cropRight - cropLeft;
    const clipH = cropBottom - cropTop;

    svg.setAttribute('viewBox', `${cropLeft} ${cropTop} ${clipW} ${clipH}`);

    const defs = d3.select(svg).append('defs');
    defs.append('clipPath')
      .attr('id', 'worldClip')
      .append('rect')
      .attr('x', cropLeft).attr('y', cropTop)
      .attr('width', clipW).attr('height', clipH);

    const g = d3.select(svg).append('g').attr('clip-path', 'url(#worldClip)');

    // Graticule
    const graticule = d3.geoGraticule()();
    g.append('path')
      .datum(graticule)
      .attr('class', 'graticule')
      .attr('d', path);

    // Countries
    g.selectAll('.country')
      .data(countries.features)
      .enter().append('path')
      .attr('class', 'country')
      .attr('d', path)
      .on('mouseenter', function () { d3.select(this).style('fill', '#5a9fd4'); })
      .on('mouseleave', function () { d3.select(this).style('fill', ''); });

    // Bali marker
    const [x, y] = projection([BALI.lon, BALI.lat]);
    const mk = d3.select(svg).append('g').attr('clip-path', 'url(#worldClip)');
    const mg = mk.append('g')
      .attr('class', 'marker')
      .attr('id', 'mk-bali')
      .on('click', () => { active = !active; mg.classed('active', active); });

    mg.append('circle').attr('class', 'ring').attr('cx', x).attr('cy', y).attr('r', 7);
    mg.append('circle').attr('class', 'dot').attr('cx', x).attr('cy', y).attr('r', 4);
  })
  .catch(() => {
    document.getElementById('loadMsg').textContent = 'Could not load map data.';
  });
</script>
</body>
</html>
